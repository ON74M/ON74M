<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>N74 TEC | Soluções em TI</title>

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/neuropol-2" rel="stylesheet">

<style>

/* ==================================================
N74 TEC | INDEX CLEAN
VERSÃO: TITLE ONLY
================================================== */

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;

font-family:'Ubuntu', sans-serif;
font-weight:300;
}

html,body{
width:100%;
height:100%;

overflow:hidden;

background:#000;
color:#00ff41;
}

/* ================= MATRIX ================= */

canvas{
position:fixed;
inset:0;

width:100%;
height:100%;

z-index:0;
pointer-events:none;
}

/* ================= OVERLAY ================= */

body::before{
content:"";

position:fixed;
inset:0;

background:rgba(0,0,0,0.68);

z-index:1;
}

/* ================= CENTER ================= */

.center{
position:relative;
z-index:2;

width:100%;
height:100dvh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:20px;

text-align:center;
}

/* ================= TITLE ================= */

.title{
font-family:'Neuropol', sans-serif;

font-size:clamp(34px, 10vw, 76px);

color:#00ff41;

text-shadow:
0 0 10px #00ff41,
0 0 20px rgba(0,255,65,0.5);

animation:pulse 2.8s ease-in-out infinite;
}

/* ================= SUBTITLE ================= */

.subtitle{
margin-top:10px;

font-size:clamp(13px, 3vw, 18px);

color:#00cc33;

letter-spacing:1px;
}

/* ================= ANIMATION ================= */

@keyframes pulse{

0%{
opacity:0.75;
transform:scale(1);
}

50%{
opacity:1;
transform:scale(1.02);
}

100%{
opacity:0.75;
transform:scale(1);
}

}

</style>

</head>

<body>

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<div class="center">

<div class="title">
N74 TEC
</div>

<div class="subtitle">
Soluções em TI
</div>

</div>

<script>

/* ================= MATRIX ================= */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();

const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&";
const fontSize=15;

let columns;
let drops=[];

function init(){

columns=Math.floor(canvas.width/fontSize);

drops=[];

for(let i=0;i<columns;i++){
drops.push(1);
}

}

init();

function draw(){

ctx.fillStyle="rgba(0,0,0,0.04)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff41";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize>canvas.height
&& Math.random()>0.975
){
drops[i]=0;
}

drops[i]+=0.75;

}

}

setInterval(draw,45);

window.addEventListener("resize",()=>{

resize();
init();

});

</script>

</body>
</html>
