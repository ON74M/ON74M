<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>N74 TEC | Soluções em TI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400&display=swap"
rel="stylesheet">

<link href="https://fonts.cdnfonts.com/css/neuropol-2"
rel="stylesheet">

<style>

/* ==================================================
RESET
================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;

font-family:'Ubuntu',sans-serif;
font-weight:300;

-webkit-user-select:none;
user-select:none;

-webkit-touch-callout:none;
}

/* ==================================================
BODY
================================================== */

html,
body{
width:100%;
height:100%;

background:#000;
overflow:hidden;

color:#00ff41;
}

/* ==================================================
MATRIX
================================================== */

canvas{
position:fixed;
inset:0;

width:100%;
height:100%;

z-index:0;
pointer-events:none;
}

/* ==================================================
OVERLAY
================================================== */

body::before{
content:"";

position:fixed;
inset:0;

background:rgba(0,0,0,0.72);

z-index:1;
}

/* ==================================================
APP
================================================== */

.app{
position:relative;
z-index:2;

width:100%;
height:100dvh;

overflow:hidden;
}

/* ==================================================
HOME SCREEN
================================================== */

.home-screen{
position:absolute;
inset:0;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

transition:0.25s ease;
}

/* ==================================================
HOME HIDDEN
================================================== */

.home-screen.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.04);
}

/* ==================================================
LOGO
================================================== */

.logo{
font-family:'Neuropol',sans-serif;

font-size:clamp(42px,10vw,88px);

color:#00ff41;

text-shadow:
0 0 10px #00ff41,
0 0 20px #00ff41;

letter-spacing:4px;
}

/* ==================================================
SUBTITLE
================================================== */

.subtitle{
margin-top:12px;

font-size:14px;

color:#b7ffcf;

letter-spacing:2px;
}

/* ==================================================
SIDE MENU
================================================== */

.side-menu{
position:fixed;

top:0;
left:0;

transform:translateX(-100%);

width:270px;
height:100dvh;

background:rgba(0,0,0,0.96);

border-right:1px solid rgba(0,255,65,0.12);

padding:22px 18px;

z-index:99998;

transition:0.25s ease;

overflow-y:auto;
}

/* ==================================================
SIDE ACTIVE
================================================== */

.side-menu.active{
transform:translateX(0);
}

/* ==================================================
MENU TITLE
================================================== */

.menu-title{
font-family:'Neuropol',sans-serif;

font-size:22px;

color:#00ff41;

margin-bottom:24px;

text-shadow:0 0 10px rgba(0,255,65,0.25);
}

/* ==================================================
MENU LINKS
================================================== */

.side-menu a{
display:block;

padding:13px 0;

text-decoration:none;

color:#b7ffcf;

font-size:14px;

border-bottom:
1px solid rgba(0,255,65,0.05);

transition:0.2s ease;
}

.side-menu a:active{
padding-left:5px;
opacity:0.7;
}

/* ==================================================
OVERLAY MENU
================================================== */

.menu-overlay{
position:fixed;
inset:0;

background:rgba(0,0,0,0.55);

backdrop-filter:blur(4px);

z-index:99997;

display:none;
}

.menu-overlay.active{
display:block;
}

/* ==================================================
BOTTOM NAV
================================================== */

.bottom-nav{
position:fixed;

left:0;
bottom:0;

width:100%;
height:60px;

display:flex;
justify-content:space-around;
align-items:center;

background:rgba(0,0,0,0.92);

backdrop-filter:blur(8px);

border-top:
1px solid rgba(0,255,65,0.08);

z-index:99999;
}

/* ==================================================
NAV ITEM
================================================== */

.nav-item{
flex:1;

height:100%;

display:flex;
align-items:center;
justify-content:center;

text-decoration:none;

color:#00ff41;

opacity:0.72;

transition:0.2s ease;
}

.nav-item i{
font-size:16px;
}

.home-btn i{
font-size:18px;
}

.nav-item:active{
opacity:1;
transform:scale(0.95);
}

/* ==================================================
SAFE AREA
================================================== */

@supports (padding:max(0px)){

.bottom-nav{
padding-bottom:
max(0px, env(safe-area-inset-bottom));
}

}

/* ==================================================
SCROLLBAR
================================================== */

::-webkit-scrollbar{
width:0;
height:0;
}

</style>

</head>

<body>

<!-- ==================================================
MATRIX
================================================== -->

<canvas id="matrix"></canvas>

<!-- ==================================================
APP
================================================== -->

<div class="app">

<!-- ==================================================
HOME SCREEN
================================================== -->

<div class="home-screen"
id="homeScreen">

<div class="logo">
N74 TEC
</div>

<div class="subtitle">
SOLUÇÕES EM TI
</div>

</div>

</div>

<!-- ==================================================
OVERLAY
================================================== -->

<div class="menu-overlay"
id="menuOverlay"></div>

<!-- ==================================================
SIDE MENU
================================================== -->

<div class="side-menu"
id="sideMenu">

<div class="menu-title">
N74 TEC
</div>

<a href="/pages/suporte-tecnico.html">
Suporte Técnico
</a>

<a href="/pages/redes-wifi.html">
Redes & Wi-Fi
</a>

<a href="/pages/cftv.html">
CFTV
</a>

<a href="/pages/servidores.html">
Servidores
</a>

<a href="/pages/backup.html">
Backup
</a>

<a href="/pages/suporte-remoto.html">
Suporte Remoto
</a>

<a href="/pages/atendimento-avulso.html">
Atendimento Avulso
</a>

<a href="/pages/contrato-manutencao.html">
Contrato de Manutenção
</a>

<a href="https://www.instagram.com/n74tec/"
target="_blank">
Instagram
</a>

</div>

<!-- ==================================================
BOTTOM NAV
================================================== -->

<nav class="bottom-nav">

<!-- MENU -->

<a class="nav-item"
href="#"
id="menuButton">

<i class="fa-solid fa-bars"></i>

</a>

<!-- HOME -->

<a class="nav-item home-btn"
href="#"
id="homeButton">

<i class="fa-solid fa-house"></i>

</a>

<!-- WHATSAPP -->

<a class="nav-item"
href="https://wa.me/5511958733142"
target="_blank">

<i class="fa-solid fa-phone"></i>

</a>

</nav>

<script>

/* ==================================================
MATRIX
================================================== */

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resize();

const chars =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&";

const fontSize = 15;

let columns;
let drops = [];

function init(){

columns =
Math.floor(canvas.width/fontSize);

drops = [];

for(let i=0;i<columns;i++){

drops.push(1);

}

}

init();

function draw(){

ctx.fillStyle =
"rgba(0,0,0,0.04)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle =
"#00ff41";

ctx.font =
fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text =
chars[
Math.floor(
Math.random()*chars.length
)
];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize >
canvas.height
&& Math.random()>0.975
){
drops[i]=0;
}

drops[i]+=0.75;

}

}

setInterval(draw,45);

window.addEventListener(
"resize",
()=>{

resize();
init();

}
);

/* ==================================================
MENU
================================================== */

const menuButton =
document.getElementById("menuButton");

const homeButton =
document.getElementById("homeButton");

const sideMenu =
document.getElementById("sideMenu");

const menuOverlay =
document.getElementById("menuOverlay");

const homeScreen =
document.getElementById("homeScreen");

/* ==================================================
OPEN MENU
================================================== */

menuButton.addEventListener(
"click",
(e)=>{

e.preventDefault();

sideMenu.classList.toggle("active");

menuOverlay.classList.toggle("active");

/* MOSTRA HOME NO FUNDO */

homeScreen.classList.remove("hidden");

}
);

/* ==================================================
CLOSE OVERLAY
================================================== */

menuOverlay.addEventListener(
"click",
()=>{

sideMenu.classList.remove("active");

menuOverlay.classList.remove("active");

}
);

/* ==================================================
HOME BUTTON
================================================== */

homeButton.addEventListener(
"click",
(e)=>{

e.preventDefault();

homeScreen.classList.remove("hidden");

sideMenu.classList.remove("active");

menuOverlay.classList.remove("active");

window.scrollTo(0,0);

}
);

</script>

</body>
</html>
